# Keep the GitHub Actions used by the deploy + REUSE workflows current.
# (The site itself has no package dependencies to track.)
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
